<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <!-- Tell the UA the app is dark so the default web-view backdrop (shown
         before our CSS paints) is black, not the light/grey default. This is
         what prevents the intermittent grey launch flash. -->
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Served dynamically by the server (name = the user's frame). A valid,
         named manifest is required for iOS to honor background_color, which
         paints the launch backdrop black and prevents the intermittent grey
         flash. use-credentials so the session cookie reaches the server. -->
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>AI Pixel Art Frame</title>
    <!-- Inline so the page is black before the JS bundle/CSS loads (no white flash on refresh). -->
    <style>
      html,
      body {
        margin: 0;
        background: #000;
        color-scheme: dark;
      }
      /* Fill the viewport black from the first paint, before React mounts. */
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        background: #000;
      }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
